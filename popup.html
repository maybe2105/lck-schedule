<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LCK Schedule</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card-foot: #0f0f0f;
    --border: #1f1f1f;
    --text: #ffffff;
    --muted: #6b6b6b;
    --accent: #d4af37;
    --live: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 380px;
    max-height: 600px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .app { padding: 14px 14px 18px; }
  .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .top h1 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .top .controls { display: flex; gap: 6px; align-items: center; font-size: 10px; color: var(--muted); }
  .controls button {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 4px 7px;
    border-radius: 5px; cursor: pointer; font-size: 11px;
    line-height: 1;
  }
  .controls button:hover { color: var(--text); border-color: #333; }
  .controls button.on { color: var(--accent); border-color: var(--accent); }
  .controls .updated { padding: 0 4px; }

  .stream-bar {
    display: grid; grid-template-columns: 2fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .stream-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 12px; border-radius: 7px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.01em;
    cursor: pointer; text-decoration: none; border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .stream-btn:hover { transform: translateY(-1px); }
  .stream-btn .ico {
    width: 14px; height: 14px; display: inline-block;
    background: currentColor;
    -webkit-mask: var(--ico) center/contain no-repeat;
            mask: var(--ico) center/contain no-repeat;
  }
  .stream-btn.primary {
    background: #9146ff; color: #fff;
    --ico: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4 2v16h5v4l4-4h4l7-7V2H4zm17 8-4 4h-4l-3 3v-3H6V4h15v6z'/><path d='M16 6h2v6h-2zM11 6h2v6h-2z'/></svg>");
  }
  .stream-btn.primary:hover { background: #a970ff; }
  .stream-btn.secondary {
    background: #1c1c1c; color: #cfcfcf; border-color: var(--border);
    --ico: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4 2v16h5v4l4-4h4l7-7V2H4zm17 8-4 4h-4l-3 3v-3H6V4h15v6z'/><path d='M16 6h2v6h-2zM11 6h2v6h-2z'/></svg>");
  }
  .stream-btn.secondary:hover { background: #262626; color: #fff; border-color: #333; }

  .section { margin-bottom: 14px; }
  .section h2 { margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: -0.01em; }
  .section h2 .badge {
    display: inline-block; margin-left: 6px;
    background: var(--live); color: #fff;
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    font-weight: 700; vertical-align: middle;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .match {
    background: var(--card); border-radius: 8px;
    overflow: hidden; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  a.match {
    display: block; color: inherit; text-decoration: none;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  }
  a.match-live { border-color: #9146ff; }
  a.match-live:hover { border-color: #b58bff; transform: translateY(-1px); }
  .match .row {
    display: grid; grid-template-columns: 70px 1fr;
    align-items: center; padding: 10px 12px; gap: 10px;
  }
  .time { display: flex; align-items: baseline; gap: 3px; }
  .time .h { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .time .ap { font-size: 9px; color: var(--muted); font-weight: 600; }
  .teams {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
  }
  .team { display: flex; align-items: center; gap: 6px; }
  .team.left { justify-content: flex-end; }
  .team.right { justify-content: flex-start; }
  .team .code { font-size: 12px; font-weight: 700; letter-spacing: 0.02em; }
  .team img { width: 28px; height: 28px; object-fit: contain; }
  .vs { color: var(--muted); font-size: 13px; font-weight: 300; }

  .foot {
    background: var(--card-foot); border-top: 1px solid var(--border);
    padding: 6px 12px;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 8px;
    color: var(--muted); font-size: 10px;
  }
  .foot .league-badge {
    display: inline-flex; align-items: center;
    background: #1c1c1c; padding: 2px 5px; border-radius: 3px;
    color: #cfcfcf; font-weight: 700; font-size: 8px; letter-spacing: 0.06em;
  }
  .foot .center { text-align: center; }
  .foot .right { text-align: right; }

  .winner .code { color: #fff; }
  .loser .code { color: var(--muted); }
  .loser img { filter: grayscale(1) opacity(0.5); }

  .score { display: inline-flex; gap: 4px; margin-left: 4px; font-size: 11px; color: var(--muted); }
  .score .w { color: #fff; font-weight: 700; }

  .empty { text-align: center; color: var(--muted); padding: 24px 0; font-size: 12px; }
  .error {
    background: #2a1010; border: 1px solid #5a1818;
    color: #ffb4b4; padding: 8px 10px;
    border-radius: 6px; font-size: 11px; margin-bottom: 10px;
  }
  .footer { text-align: center; color: var(--muted); font-size: 9px; margin-top: 14px; }

  .scroll { max-height: 500px; overflow-y: auto; padding-right: 4px; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  .view[hidden] { display: none; }

  .settings-menu {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .settings-menu .menu-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .settings-menu .menu-header .back {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 3px 7px;
    border-radius: 5px; cursor: pointer; font-size: 11px; line-height: 1;
  }
  .settings-menu .menu-header .back:hover { color: var(--text); border-color: #333; }
  .menu-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .menu-row:last-child { border-bottom: 0; }
  .menu-row .label { font-size: 13px; color: var(--text); font-weight: 500; }
  .menu-row .label .sub { display: block; color: var(--muted); font-size: 11px; margin-top: 3px; font-weight: 400; }

  .switch {
    position: relative;
    width: 34px; height: 20px;
    background: #2a2a2a;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.18s;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #cfcfcf;
    border-radius: 50%;
    transition: transform 0.18s, background 0.18s;
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(14px); background: #0a0a0a; }

  .menu-row.column { flex-direction: column; align-items: stretch; gap: 8px; }
  .league-search {
    width: 100%;
    background: #0f0f0f; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 9px; font-size: 12px; outline: none;
  }
  .league-search:focus { border-color: #333; }
  .league-search::placeholder { color: var(--muted); }
  .league-list { max-height: 260px; overflow-y: auto; padding-right: 4px; }
  .league-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 9px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent;
  }
  .league-row:hover { background: #191919; }
  .league-row.on { border-color: rgba(212,175,55,0.35); background: #16130a; }
  .league-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .league-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .league-region { font-size: 9px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .lg-check {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 1.5px solid #333; border-radius: 4px;
    position: relative; transition: background 0.15s, border-color 0.15s;
  }
  .league-row.on .lg-check { background: var(--accent); border-color: var(--accent); }
  .league-row.on .lg-check::after {
    content: ""; position: absolute; left: 4px; top: 1px;
    width: 4px; height: 8px;
    border: solid #0a0a0a; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
</style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 id="title">Esports Schedule</h1>
      <div class="controls">
        <span id="updated" class="updated">—</span>
        <button id="settingsBtn" title="Settings">⚙</button>
        <button id="refreshBtn" title="Refresh">↻</button>
      </div>
    </div>

    <div id="scheduleView" class="view">
      <div class="stream-bar">
        <a id="caedrelBtn" class="stream-btn primary" href="https://www.twitch.tv/caedrel" target="_blank" rel="noopener">
          <span class="ico"></span>
          Watch caedrel
        </a>
        <a id="twitchBtn" class="stream-btn secondary" href="https://www.twitch.tv" target="_blank" rel="noopener">
          <span class="ico"></span>
          Twitch.tv
        </a>
      </div>
      <div id="content" class="scroll"></div>
    </div>

    <div id="settingsView" class="view" hidden>
      <div class="settings-menu">
        <div class="menu-header">
          <span>Settings</span>
          <span style="flex:1"></span>
          <button id="backBtn" class="back" title="Back">← Back</button>
        </div>
        <div class="menu-row">
          <div class="label">
            Notice caedrel live
            <span class="sub">Show a LIVE badge on the toolbar icon when Twitch streamer caedrel is live</span>
          </div>
          <div id="liveSwitch" class="switch" role="switch" aria-checked="false" tabindex="0"></div>
        </div>
        <div class="menu-row column">
          <div class="label">
            Leagues
            <span class="sub">Pick which leagues appear in your schedule (e.g. LCK, MSI, Worlds, EWC)</span>
          </div>
          <input id="leagueSearch" class="league-search" type="text" placeholder="Search leagues…" />
          <div id="leagueList" class="league-list scroll"></div>
        </div>
      </div>
    </div>

    <div class="footer">Auto-refresh 4m</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
